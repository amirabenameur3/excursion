<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./ressources/css/index.css">
    <link href="https://fonts.googleapis.com/css?family=Verdana" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <title>Excursion Project</title>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Discover hidden places in the world around you</h1>
        <a href="#download" class="download-link">Download Excursion (Coming soon!)</a>
    </header>

    <!-- Main Content -->

    <div class="main-content"> 

        <!-- Section 1: Introduction -->

        <div class="media">
            <video src="./ressources/videos/excursion.mp4" type="video/mp4" autoplay muted loop playsinline>Video not supported</video>
        </div>

        <!-- Section 2: Features -->
        <div class="features">
            <h2 class="title">Your personal travel guide</h2>
            <p class="description">Excursion remembers places you like, and recommends new points of interest around you.</p>
            <img src="./ressources/images/camp.jpg" alt="camp image">
        </div>

        <!-- Section 3: Download -->
        <div class="download" id="download">
            <img src="./ressources/images/phone.png" alt="mobile image">
            <h2>Coming Soon for iPhone and Android</h2>
            <a href="#download" class="download-link">Download Excursion (coming soon!)</a>
        </div>

        <!-- Footer -->
        <footer>
            <i id="copyright-icon" class="fas fa-copyright fa-lg"></i>
            <span class="copyright">Excursion</span>
        </footer>
    </div>

</body>
</html>
